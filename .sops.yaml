# .sops.yaml — controls which age recipients can decrypt which files.
#
# After running `age-keygen`, paste this machine's PUBLIC key (age1...) below,
# replacing the placeholder. Then `sops secrets/secrets.yaml` will encrypt to it.
# Add one key per machine/user that should be able to decrypt.
keys:
  - &withrin age1REPLACE_WITH_YOUR_PUBLIC_AGE_KEY
creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
      - age:
          - *withrin
